name: release

# Cut a GitHub Release when a vX.Y.Z tag is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # softprops/action-gh-release creates the Release

jobs:
  release:
    # GitHub-HOSTED, never self-hosted: this job handles release credentials and
    # must not run on the shared myconaid-fleet box. (CI runs self-hosted; release
    # does not.) setup-python is fine here because hosted runners ship it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*  # sanity-check sdist+wheel metadata before publishing
      - name: Publish GitHub Release
        # GitHub Releases only -- no PyPI publish. Attaches the built artifacts.
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
