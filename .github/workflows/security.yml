name: security

# Software-composition analysis (SCA): audit the dependencies we actually ship -- the
# runtime deps plus the optional [llm] and [discord] extras -- against the PyPA/OSV
# advisory database. The weekly schedule matters: a CVE can be disclosed against a pinned
# dependency long after the last commit, so this surfaces it even with no code change.
# Dependabot (.github/dependabot.yml) then opens the bump PR that turns this gate green.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "27 4 * * 1" # weekly (Mon 04:27 UTC)

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: dependency audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11" # the supported floor (pyproject requires-python >=3.11)
      - name: Install shipped deps (+ optional extras) and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[llm,discord]"
          pip install pip-audit
      # No --strict: the local editable package isn't on PyPI and is skipped, which --strict
      # would (wrongly) treat as a failure. Plain pip-audit exits non-zero only on a real CVE.
      - name: Audit installed packages for known CVEs
        run: pip-audit --desc
