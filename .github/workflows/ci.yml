name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the default GITHUB_TOKEN only needs to read the repo to
# check out + run tests. Shrinks blast radius if a step is ever compromised.
permissions:
  contents: read

# Per-branch concurrency (fleet pattern): a newer push to the same ref cancels
# the older run, freeing the shared self-hosted runner on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Self-hosted runners on the shared myconaid-k3s box (labels are
    # repo-scoped, so this only routes to steadystate.ai's runners).
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    # Keep untrusted fork PR code off the shared self-hosted fleet runner: only
    # run on pushes and on PRs from branches in this repo. When the repo goes
    # public, add a separate fork path on ubuntu-latest (GitHub-hosted) so
    # outside contributors still get CI without touching the fleet box.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up venv + install
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ".[dev]"
      - name: Lint
        run: .venv/bin/ruff check src tests
      - name: Format check
        run: .venv/bin/ruff format --check src tests
      - name: Types
        run: .venv/bin/mypy src
      - name: Test
        run: .venv/bin/pytest -q --cov=steadystate --cov-report=term-missing --cov-fail-under=75
      - name: Build check
        run: |
          .venv/bin/python -m build
          .venv/bin/twine check dist/*
