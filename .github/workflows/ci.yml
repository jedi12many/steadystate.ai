name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    # Self-hosted runners on the shared myconaid-k3s box (labels are
    # repo-scoped, so this only routes to steadystate.ai's runners).
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up venv + install
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ".[dev]"
      - name: Lint
        run: .venv/bin/ruff check src tests
      - name: Test
        run: .venv/bin/pytest -q
